# DocuTrust Virtual Gateway (VGW) - Nginx Configuration
# CSC Requirement: Dedicated VGW handling all incoming PKI requests
#
# Deploy on separate droplet from the application server.
# Only this server has a public IP. App server is VPC-only.

worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
    use epoll;
}

http {
    # Security headers
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-VGW-Node "docutrust-vgw-01" always;

    # Logging (audit trail)
    log_format vgw_audit '$remote_addr - $remote_user [$time_local] '
                         '"$request" $status $body_bytes_sent '
                         '"$http_referer" "$http_user_agent" '
                         'ssl_client_s_dn="$ssl_client_s_dn" '
                         'ssl_client_verify="$ssl_client_verify" '
                         'request_id="$request_id"';

    access_log /var/log/nginx/vgw-access.log vgw_audit;

    # Rate limiting
    limit_req_zone $binary_remote_addr zone=pki_limit:10m rate=30r/m;
    limit_req_zone $binary_remote_addr zone=ocsp_limit:10m rate=120r/m;

    # IP allowlist for HSM operations (internal services only)
    geo $hsm_allowed {
        default 0;
        # Add your application server private IPs here
        10.0.0.0/8     1;
        172.16.0.0/12  1;
        192.168.0.0/16 1;
        127.0.0.1      1;
    }

    # Upstream: Application server (private VPC IP)
    upstream app_server {
        server APP_SERVER_PRIVATE_IP:8080;
        keepalive 32;
    }

    # HTTPS server (main PKI endpoints)
    server {
        listen 443 ssl http2;
        server_name pki.docutrust.com;

        # TLS configuration (server certificate)
        ssl_certificate     /etc/nginx/ssl/server.crt;
        ssl_certificate_key /etc/nginx/ssl/server.key;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
        ssl_prefer_server_ciphers on;
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 10m;

        # mTLS (client certificate verification) - optional per endpoint
        ssl_client_certificate /etc/nginx/client-certs/ca-bundle.pem;
        ssl_verify_client optional;

        # OCSP endpoint (public, no auth required, high rate limit)
        location /ocsp {
            limit_req zone=ocsp_limit burst=60 nodelay;

            proxy_pass http://app_server;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Request-ID $request_id;
            proxy_set_header X-VGW-Verified "true";
        }

        # CRL distribution (public, cached)
        location ~ ^/crl\.(pem|der)$ {
            limit_req zone=ocsp_limit burst=30 nodelay;

            proxy_pass http://app_server;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-VGW-Verified "true";

            # Cache CRL responses
            proxy_cache_valid 200 10m;
        }

        # SCEP endpoint (enrollment - requires rate limiting)
        location /api/scep {
            limit_req zone=pki_limit burst=10 nodelay;

            proxy_pass http://app_server;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Request-ID $request_id;
            proxy_set_header X-VGW-Verified "true";
            proxy_set_header X-Client-Cert $ssl_client_cert;
            proxy_set_header X-Client-Verify $ssl_client_verify;
        }

        # CMP endpoint (certificate management - requires mTLS)
        location /api/cmp {
            limit_req zone=pki_limit burst=10 nodelay;

            # Require client certificate for CMP
            if ($ssl_client_verify != SUCCESS) {
                return 401 "Client certificate required for CMP operations";
            }

            proxy_pass http://app_server;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Request-ID $request_id;
            proxy_set_header X-VGW-Verified "true";
            proxy_set_header X-Client-DN $ssl_client_s_dn;
            proxy_set_header X-Client-Cert $ssl_client_cert;
            proxy_set_header X-Client-Verify $ssl_client_verify;
        }

        # HSM API (internal only - IP restricted)
        location /api/hsm {
            if ($hsm_allowed = 0) {
                return 403 "Access denied";
            }

            limit_req zone=pki_limit burst=5 nodelay;

            proxy_pass http://app_server;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Request-ID $request_id;
            proxy_set_header X-VGW-Verified "true";
        }

        # SCEP CA certificate (public)
        location /scep/cacert {
            proxy_pass http://app_server;
            proxy_set_header Host $host;
            proxy_set_header X-VGW-Verified "true";
            proxy_cache_valid 200 1h;
        }

        # Block everything else
        location / {
            return 404;
        }
    }

    # HTTP server (redirect to HTTPS, except OCSP which RFC allows over HTTP)
    server {
        listen 80;
        server_name pki.docutrust.com;

        # OCSP over HTTP (RFC 6960 allows this)
        location /ocsp {
            limit_req zone=ocsp_limit burst=60 nodelay;

            proxy_pass http://app_server;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-VGW-Verified "true";
        }

        # CRL over HTTP (common for PKI clients)
        location ~ ^/crl\.(pem|der)$ {
            proxy_pass http://app_server;
            proxy_set_header Host $host;
            proxy_set_header X-VGW-Verified "true";
        }

        # Everything else redirects to HTTPS
        location / {
            return 301 https://$host$request_uri;
        }
    }
}
